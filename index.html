<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pulso — Inteligencia de estructura para startups de LATAM</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy:      #0B1F3D;
      --teal:      #0ABFCF;
      --teal-dark: #0899A8;
      --white:     #FFFFFF;
      --slate:     #5A7A94;
      --border:    #E2EBF0;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--white);
      color: var(--navy);
      -webkit-font-smoothing: antialiased;
    }

    /* ── NAV ── */
    .nav-wrapper {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      width: calc(100% - 48px);
      max-width: 1100px;
      z-index: 100;
    }

    nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 28px;
      height: 60px;
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-radius: 100px;
      box-shadow: 0 2px 24px rgba(0, 0, 0, 0.10), 0 0 0 1px rgba(255,255,255,0.6);
    }

    /* Logo */
    .logo {
      display: flex;
      align-items: center;
      gap: 6px;
      text-decoration: none;
      color: var(--navy);
      flex-shrink: 0;
    }

    .logo-word {
      font-size: 1.45rem;
      font-weight: 900;
      letter-spacing: -1px;
      color: var(--navy);
    }

    .logo-wave {
      display: flex;
      align-items: center;
    }

    /* Nav links */
    .nav-links {
      display: flex;
      align-items: center;
      gap: 28px;
      list-style: none;
    }

    .nav-links a {
      text-decoration: none;
      color: var(--navy);
      font-size: 0.82rem;
      font-weight: 700;
      letter-spacing: 0.6px;
      text-transform: uppercase;
      opacity: 0.75;
      transition: opacity 0.2s;
    }

    .nav-links a:hover { opacity: 1; }

    /* Nav right: account icon */
    .nav-icon {
      width: 34px;
      height: 34px;
      border: 2px solid var(--border);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: border-color 0.2s;
      flex-shrink: 0;
    }

    .nav-icon:hover { border-color: var(--teal); }

    /* ── HERO ── */
    .hero {
      min-height: 100vh;
      display: flex;
      align-items: center;
      padding: 140px 5% 100px;
      position: relative;
      overflow: hidden;
      /* Horizontal stripe texture over teal-blue gradient */
      background:
        repeating-linear-gradient(
          0deg,
          transparent 0px,
          transparent 5px,
          rgba(255, 255, 255, 0.055) 5px,
          rgba(255, 255, 255, 0.055) 6px
        ),
        linear-gradient(
          125deg,
          #C8EEF8 0%,
          #82D4EA 18%,
          #3BBCD8 36%,
          #0AAFCA 52%,
          #0892B4 68%,
          #0A7FA8 84%,
          #0B6E96 100%
        );
    }

    .hero-inner {
      max-width: 1000px;
      width: 100%;
    }

    /* Main headline */
    .hero-h1 {
      font-size: clamp(3.2rem, 9vw, 7.2rem);
      font-weight: 900;
      line-height: 0.97;
      letter-spacing: -3.5px;
      color: var(--navy);
      margin-bottom: 0;
    }

    /* "Somos [sticker]." line — same visual weight as h1 */
    .hero-somos {
      display: flex;
      align-items: center;
      gap: 18px;
      flex-wrap: wrap;
      margin-top: 8px;
    }

    .hero-somos-text {
      font-size: clamp(3.2rem, 9vw, 7.2rem);
      font-weight: 900;
      line-height: 0.97;
      letter-spacing: -3.5px;
      color: var(--navy);
    }

    .hero-somos-dot {
      font-size: clamp(3.2rem, 9vw, 7.2rem);
      font-weight: 900;
      line-height: 0.97;
      letter-spacing: -3.5px;
      color: var(--navy);
    }

    /* The inline brand sticker */
    .brand-sticker {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: var(--white);
      border-radius: 18px;
      padding: 10px 22px 10px 18px;
      box-shadow:
        3px 5px 24px rgba(0, 0, 0, 0.14),
        0 0 0 1.5px rgba(255, 255, 255, 0.7);
      transform: rotate(-1.5deg);
      position: relative;
      top: -4px;
    }

    .sticker-word {
      font-size: clamp(2rem, 5.5vw, 4.4rem);
      font-weight: 900;
      letter-spacing: -2px;
      line-height: 1;
      background: linear-gradient(
        90deg,
        #FF6B6B 0%,
        #FFD93D 22%,
        #6BCB77 44%,
        #4D96FF 66%,
        #C77DFF 88%,
        #FF6B6B 100%
      );
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .sticker-wave {
      display: flex;
      align-items: center;
      flex-shrink: 0;
    }

    /* Subtitle */
    .hero-sub {
      font-size: clamp(1.1rem, 2.8vw, 1.55rem);
      font-weight: 600;
      color: var(--navy);
      opacity: 0.78;
      margin-top: 28px;
      letter-spacing: -0.3px;
    }

    /* CTA buttons */
    .hero-actions {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-top: 52px;
      flex-wrap: wrap;
    }

    .btn-ghost {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 15px 30px;
      border-radius: 100px;
      border: 2.5px solid var(--navy);
      background: transparent;
      color: var(--navy);
      font-size: 0.92rem;
      font-weight: 800;
      font-family: inherit;
      text-decoration: none;
      cursor: pointer;
      letter-spacing: 0.2px;
      transition: background 0.2s, transform 0.18s;
    }

    .btn-ghost:hover {
      background: rgba(11, 31, 61, 0.07);
      transform: translateY(-2px);
    }

    .btn-solid {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 15px 30px;
      border-radius: 100px;
      border: none;
      background: var(--navy);
      color: var(--white);
      font-size: 0.92rem;
      font-weight: 800;
      font-family: inherit;
      text-decoration: none;
      cursor: pointer;
      letter-spacing: 0.2px;
      transition: background 0.2s, transform 0.18s;
    }

    .btn-solid:hover {
      background: #162C4E;
      transform: translateY(-2px);
    }

    /* Scroll indicator */
    .scroll-hint {
      position: absolute;
      bottom: 36px;
      right: 40px;
      width: 40px;
      height: 40px;
      background: rgba(255, 255, 255, 0.25);
      border: 2px solid rgba(255, 255, 255, 0.5);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--white);
      animation: bounce 2s ease-in-out infinite;
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(5px); }
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 860px) {
      .nav-links { display: none; }
      .nav-wrapper { width: calc(100% - 28px); }
    }

    @media (max-width: 560px) {
      .hero { padding: 120px 6% 80px; }
      .hero-h1 { letter-spacing: -2px; }
      .hero-somos-text,
      .hero-somos-dot { letter-spacing: -2px; }
      .hero-somos { gap: 10px; }
      .brand-sticker { padding: 8px 16px 8px 14px; border-radius: 14px; }
      .scroll-hint { display: none; }
    }
  </style>
</head>
<body>

<!-- NAV -->
<div class="nav-wrapper">
  <nav>
    <!-- Logo -->
    <a class="logo" href="#">
      <span class="logo-word">pulso</span>
      <span class="logo-wave">
        <svg width="24" height="17" viewBox="0 0 24 17" fill="none" aria-hidden="true">
          <path d="M1 9h3.5L7 2l4 13 3.5-11L17 9h6" stroke="#0ABFCF" stroke-width="2.2"
                stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </span>
    </a>

    <!-- Links -->
    <ul class="nav-links">
      <li><a href="#productos">Productos</a></li>
      <li><a href="#segmentos">Segmentos</a></li>
      <li><a href="#nosotros">Nosotros</a></li>
      <li><a href="#contacto">Contacto</a></li>
    </ul>

    <!-- Account icon -->
    <div class="nav-icon" aria-label="Cuenta">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none"
           stroke="#0B1F3D" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
        <circle cx="12" cy="7" r="4"/>
      </svg>
    </div>
  </nav>
</div>

<!-- HERO -->
<section class="hero" id="home">
  <div class="hero-inner">

    <!-- Main headline -->
    <h1 class="hero-h1">
      Hacemos que tus<br/>datos de equipo hablen.
    </h1>

    <!-- "Somos [sticker]." line -->
    <div class="hero-somos">
      <span class="hero-somos-text">Somos</span>

      <span class="brand-sticker">
        <span class="sticker-word">pulso</span>
        <span class="sticker-wave">
          <svg width="38" height="27" viewBox="0 0 38 27" fill="none" aria-hidden="true">
            <path d="M2 14h5L10 3l5 21 5-16 4 8 7 0" stroke="url(#sw)" stroke-width="3"
                  stroke-linecap="round" stroke-linejoin="round"/>
            <defs>
              <linearGradient id="sw" x1="2" y1="14" x2="36" y2="14" gradientUnits="userSpaceOnUse">
                <stop stop-color="#FF6B6B"/>
                <stop offset="0.25" stop-color="#FFD93D"/>
                <stop offset="0.5"  stop-color="#6BCB77"/>
                <stop offset="0.75" stop-color="#4D96FF"/>
                <stop offset="1"    stop-color="#C77DFF"/>
              </linearGradient>
            </defs>
          </svg>
        </span>
      </span>

      <span class="hero-somos-dot">.</span>
    </div>

    <!-- Subtitle -->
    <p class="hero-sub">Tu partner de estructura para crecer.</p>

    <!-- CTAs -->
    <div class="hero-actions">
      <a href="#contacto" class="btn-ghost">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2.8" stroke-linecap="round">
          <path d="M12 5v14M5 12l7 7 7-7"/>
        </svg>
        ¿Cuánto pagar?
      </a>
      <a href="#productos" class="btn-solid">
        ¿Cómo organizarse?
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2.8" stroke-linecap="round">
          <path d="M5 12h14M12 5l7 7-7 7"/>
        </svg>
      </a>
    </div>

  </div>

  <!-- Scroll hint -->
  <div class="scroll-hint" aria-hidden="true">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
         stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
      <path d="M12 5v14M5 12l7 7 7-7"/>
    </svg>
  </div>
</section>

</body>
</html>
